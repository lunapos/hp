name: Test

on:
  push:
    branches: [main, master]
    paths:
      - 'lunapos-admin/**'
      - 'supabase/functions/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'lunapos-admin/**'
      - 'supabase/functions/**'

jobs:
  admin-test:
    name: Admin テスト & ビルド
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lunapos-admin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: lunapos-admin/package-lock.json

      - run: npm ci

      - name: 型チェック
        run: npx tsc --noEmit

      - name: テスト実行
        run: npm test

      - name: ビルド確認
        run: npm run build

  edge-function-check:
    name: Edge Function 構文チェック
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: store-signup 構文チェック
        run: deno check supabase/functions/store-signup/index.ts

      - name: device-auth 構文チェック
        run: deno check supabase/functions/device-auth/index.ts
