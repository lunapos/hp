name: Test

on:
  push:
    branches: [main, master]
    paths:
      - 'lunapos-admin/**'
      - 'lunapos-cast/**'
      - 'supabase/functions/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'lunapos-admin/**'
      - 'lunapos-cast/**'
      - 'supabase/functions/**'

jobs:
  admin-test:
    name: Admin テスト & ビルド
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lunapos-admin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: lunapos-admin/package-lock.json

      - run: npm ci

      - name: 型チェック
        run: npx tsc --noEmit

      - name: テスト実行
        run: npm test

      - name: ビルド確認
        run: npm run build

  cast-test:
    name: Cast テスト & ビルド
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lunapos-cast

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: lunapos-cast/package-lock.json

      - run: npm ci

      - name: 型チェック
        run: npx tsc --noEmit

      - name: テスト実行
        run: npm test

      - name: ビルド確認
        run: npm run build

  sync-admin:
    name: Admin → lunapos/admin sync
    needs: admin-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: lunapos/admin にsync
        run: |
          git config user.name "zh-ru"
          git config user.email "zh-ru@users.noreply.github.com"
          git remote add lunapos-admin https://x-access-token:${{ secrets.LUNAPOS_DEPLOY_TOKEN }}@github.com/lunapos/admin.git
          git subtree push --prefix=lunapos-admin lunapos-admin main

  edge-function-check:
    name: Edge Function 構文チェック
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: store-signup 構文チェック
        run: deno check supabase/functions/store-signup/index.ts

      - name: device-auth 構文チェック
        run: deno check supabase/functions/device-auth/index.ts
